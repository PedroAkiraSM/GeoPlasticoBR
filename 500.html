<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erro interno | GeoPlasticoBR</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .error-container { text-align: center; max-width: 520px; }
        .error-code {
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 800;
            color: rgba(239, 68, 68, 0.15);
            line-height: 1;
            letter-spacing: -0.05em;
        }
        .error-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 800;
            margin: -1rem 0 1rem;
            letter-spacing: -0.02em;
        }
        .error-desc {
            font-size: 1rem;
            color: rgba(148, 163, 184, 0.7);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.9rem 2rem; background: #fff; color: #0F172A;
            font-weight: 700; font-size: 0.95rem; border-radius: 50px;
            text-decoration: none; transition: all 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">Erro interno do servidor</h1>
        <p class="error-desc">Algo deu errado no nosso lado. Tente novamente em alguns instantes. Se o problema persistir, entre em contato conosco.</p>
        <a href="/" class="btn-primary">Voltar ao Inicio</a>
    </div>
</body>
</html>
